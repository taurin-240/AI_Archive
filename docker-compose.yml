version: '3.9'

services:
  neo4j:
    image: neo4j:5
    container_name: ai_archive_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  app:
    build: .
    container_name: ai_archive_app
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./models:/app/models
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs: